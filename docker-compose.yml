
services:
  # 1. Основной сайт (Next.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Переопределяем URL базы, чтобы он смотрел на контейнер postgres
      - DATABASE_URL=postgresql://soundspa:QQyo7zDqJMukdveU3C1LuJPyCAdDehbU@postgres:5432/soundspa
    depends_on:
      - postgres

   # 2. ИИ-Сторож (Watcher) — ВСЁ ЗАКОММЕНТИРОВАНО
  # watcher:
  #   build: .
  #   command: npx tsx --tsconfig tsconfig.json scripts/watcher.ts
  #   working_dir: /app
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   environment:
  #     - DATABASE_URL=postgresql://soundspa:QQyo7zDqJMukdveU3C1LuJPyCAdDehbU@postgres:5432/soundspa
  #   depends_on:
  #     - postgres

  # 3. База данных
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: soundspa
      POSTGRES_PASSWORD: QQyo7zDqJMukdveU3C1LuJPyCAdDehbU 
      POSTGRES_DB: soundspa
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Прокидываем порт наружу только на 127.0.0.1 для безопасности
      - "127.0.0.1:5432:5432"

  # 4. Админка базы данных
  drizzle-studio:
    build:
      context: .
      dockerfile: Dockerfile
    # Указываем рабочий каталог, чтобы npx понимал, где он находится
    working_dir: /app
    command: npx drizzle-kit studio --port 4983 --host 0.0.0.0 --config drizzle.config.json
    restart: always
    ports:
      - "4983:4983"
    env_file:
      - .env
    # 🔥 ВОТ ЭТОТ ТУННЕЛЬ:
    volumes:
      - ./drizzle.config.json:/app/drizzle.config.json
      - ./db:/app/db
    environment:
      - DATABASE_URL=postgresql://soundspa:QQyo7zDqJMukdveU3C1LuJPyCAdDehbU@127.0.0.1:5432/soundspa 
    depends_on:
      - postgres
      # 🔥 ВОТ ЭТОГО БЛОКА НЕ ХВАТАЛО:
volumes:
  pgdata: