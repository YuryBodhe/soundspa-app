<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест iOS Safari Login</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px 20px; margin: 10px 0; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Тест iOS Safari Login</h1>
    
    <div class="test">
        <h3>Тест 1: Простой fetch запрос</h3>
        <button onclick="testSimpleFetch()">Выполнить простой fetch</button>
        <pre id="result1">Нажмите кнопку...</pre>
    </div>
    
    <div class="test">
        <h3>Тест 2: Логин запрос (без данных)</h3>
        <button onclick="testLoginFetch()">Выполнить логин запрос</button>
        <pre id="result2">Нажмите кнопку...</pre>
    </div>
    
    <div class="test">
        <h3>Тест 3: Проверка события submit</h3>
        <form id="testForm" onsubmit="testFormSubmit(event)">
            <input type="email" placeholder="Email" value="108aura@gmail.com">
            <input type="password" placeholder="Password" value="test123">
            <button type="submit">Отправить форму</button>
        </form>
        <pre id="result3">Отправьте форму...</pre>
    </div>
    
    <div class="test">
        <h3>Информация о браузере:</h3>
        <pre id="browserInfo"></pre>
    </div>

    <script>
        document.getElementById('browserInfo').textContent = 
            'User Agent: ' + navigator.userAgent + '\n' +
            'Platform: ' + navigator.platform + '\n' +
            'Cookies Enabled: ' + navigator.cookieEnabled;
        
        function testSimpleFetch() {
            const result = document.getElementById('result1');
            result.textContent = 'Выполняем запрос...';
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'test@test.com', password: 'wrong' })
            })
            .then(response => {
                result.textContent = 'Статус: ' + response.status + ' ' + response.statusText + '\n';
                return response.text();
            })
            .then(text => {
                result.textContent += 'Ответ: ' + text;
                result.parentElement.className = 'test success';
            })
            .catch(error => {
                result.textContent = 'Ошибка: ' + error.message;
                result.parentElement.className = 'test error';
            });
        }
        
        function testLoginFetch() {
            const result = document.getElementById('result2');
            result.textContent = 'Выполняем логин запрос...';
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: '108aura@gmail.com', password: 'wrongpassword' })
            })
            .then(response => {
                result.textContent = 'Статус: ' + response.status + ' ' + response.statusText + '\n';
                return response.json().catch(() => ({ error: 'Не JSON ответ' }));
            })
            .then(data => {
                result.textContent += 'Ответ: ' + JSON.stringify(data, null, 2);
                result.parentElement.className = response.status === 200 ? 'test success' : 'test';
            })
            .catch(error => {
                result.textContent = 'Ошибка: ' + error.message;
                result.parentElement.className = 'test error';
            });
        }
        
        function testFormSubmit(e) {
            e.preventDefault();
            const result = document.getElementById('result3');
            result.textContent = 'Форма отправлена! preventDefault сработал.\n';
            result.textContent += 'Можно выполнить fetch запрос...';
            result.parentElement.className = 'test success';
            
            // Симулируем реальный запрос
            setTimeout(() => {
                testLoginFetch();
            }, 500);
        }
    </script>
</body>
</html>
