name: Deploy to Hetzner

on:
  push:
    branches:
      - main # убедись, что твоя ветка называется именно main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Переходим в правильную папку
            cd /opt/soundspa-app
            
            # Подтягиваем код
            git pull origin main
            
            # Устанавливаем зависимости и собираем проект
            npm install
            npm run build
            
            # Перезапускаем плеер через pm2
            # Используем npx на случай, если pm2 не прописан в глобальных путях
            npx pm2 restart all