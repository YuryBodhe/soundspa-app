name: Deploy to Hetzner

on:
  push:
    branches:
      - main 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}     # IP твоего сервера
          username: ${{ secrets.SERVER_USER }} # Твой логин (обычно root или dev)
          key: ${{ secrets.SERVER_SSH_KEY }}   # Приватный SSH ключ
          script: |
            cd /Users/bodhem3/Zavod/apps/soundspa-app # Путь к проекту на сервере
            git pull origin main
            npm install
            npm run build
            pm2 restart all # Или имя конкретного процесса