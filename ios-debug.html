<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Debug Login</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        input, button { 
            display: block; 
            width: 100%; 
            margin: 10px 0; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button { 
            background: #007AFF; 
            color: white; 
            border: none; 
            min-height: 44px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>iOS Debug Login</h1>
    
    <div class="test">
        <h3>Тест 1: Простая HTML форма (без React)</h3>
        <form id="simpleForm" action="/api/auth/login" method="POST">
            <input type="email" name="email" placeholder="Email" value="108aura@gmail.com" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Войти (HTML form)</button>
        </form>
        <pre id="simpleResult">Отправка HTML формы...</pre>
    </div>
    
    <div class="test">
        <h3>Тест 2: JavaScript fetch (как в React)</h3>
        <div>
            <input id="jsEmail" type="email" placeholder="Email" value="108aura@gmail.com">
            <input id="jsPassword" type="password" placeholder="Password">
            <button onclick="submitWithJS()">Войти (JavaScript fetch)</button>
        </div>
        <pre id="jsResult">Нажмите кнопку...</pre>
    </div>
    
    <div class="test">
        <h3>Тест 3: Добавление события вручную</h3>
        <button id="manualButton" style="background: #34C759;">Тапни меня (обработчик добавлен через JS)</button>
        <pre id="manualResult">Кнопка без обработчика...</pre>
    </div>
    
    <div class="test">
        <h3>Информация о браузере:</h3>
        <pre id="browserInfo"></pre>
    </div>

    <script>
        document.getElementById('browserInfo').textContent = 
            'User Agent: ' + navigator.userAgent + '\n' +
            'Platform: ' + navigator.platform + '\n' +
            'Touch Points: ' + (navigator.maxTouchPoints || 'unknown');
        
        // Тест 1: Простая форма
        document.getElementById('simpleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const result = document.getElementById('simpleResult');
            result.textContent = 'Форма отправлена! Событие submit сработало.\n';
            result.textContent += 'Теперь выполняется fetch...';
            
            const formData = new FormData(this);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => {
                result.textContent += '\nСтатус: ' + r.status;
                return r.json();
            })
            .then(d => {
                result.textContent += '\nОтвет: ' + JSON.stringify(d);
                if (r.status === 200) {
                    window.location.href = '/app';
                }
            })
            .catch(err => {
                result.textContent += '\nОшибка: ' + err.message;
            });
        });
        
        // Тест 2: JavaScript fetch
        function submitWithJS() {
            const result = document.getElementById('jsResult');
            const email = document.getElementById('jsEmail').value;
            const password = document.getElementById('jsPassword').value;
            
            result.textContent = 'Отправка запроса...\n';
            result.textContent += 'Email: ' + email + '\n';
            result.textContent += 'Password: ' + (password ? '***' : 'empty');
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(response => {
                result.textContent += '\nСтатус: ' + response.status + ' ' + response.statusText;
                return response.json();
            })
            .then(data => {
                result.textContent += '\nОтвет: ' + JSON.stringify(data, null, 2);
                if (response.status === 200) {
                    window.location.href = '/app';
                }
            })
            .catch(error => {
                result.textContent += '\nОшибка: ' + error.message;
            });
        }
        
        // Тест 3: Ручное добавление обработчика
        const manualButton = document.getElementById('manualButton');
        const manualResult = document.getElementById('manualResult');
        
        manualButton.addEventListener('click', function() {
            manualResult.textContent = 'Клик сработал!';
        });
        
        manualButton.addEventListener('touchstart', function() {
            manualResult.textContent = 'Touch start!';
        });
        
        manualButton.addEventListener('touchend', function(e) {
            e.preventDefault();
            manualResult.textContent = 'Touch end! Вызываем click программно...';
            this.click();
        });
    </script>
</body>
</html>
